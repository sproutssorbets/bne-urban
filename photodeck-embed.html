<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoIndex — Archive & Map Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
<!-- PapaParse do niezawodnego parsowania CSV -->
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; border-radius: 0 !important; box-shadow: none !important; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #FFFFFF; color: #111111; }

  #topbar { border-bottom: 1px solid #111111; background: #FFFFFF; flex-shrink: 0; }
  #search-row { display: flex; align-items: center; height: 56px; padding: 0 20px; border-bottom: 1px solid #111111; gap: 12px; }
  #geocoder { flex: 1; }
  #geocoder .mapboxgl-ctrl-geocoder { width: 100%; max-width: none; font-family: inherit; box-shadow: none; background: #FFFFFF; }
  #geocoder .mapboxgl-ctrl-geocoder input { height: 36px; font-size: 13px; color: #111111; font-family: inherit; background: #FFFFFF; }
  #geocoder .mapboxgl-ctrl-geocoder--icon-search { fill: #6B6B6B; top: 9px; }
  
  #search-archive-btn { height: 36px; padding: 0 16px; border: 1px solid #111111; background: #111111; color: #FFFFFF; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; flex-shrink: 0; }
  #search-archive-btn:hover { background: #333333; }

  #chip-row { display: flex; align-items: center; padding: 10px 20px; flex-wrap: wrap; min-height: 20px; background: #FFFFFF; border-bottom: 1px solid #111111; }
  #chip-row:not(.has-search) { display: none !important; }
  
  #chip-label { font-size: 10px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #6B6B6B; margin-right: 12px; }
  .chip { display: inline-flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid #111111; padding: 3px 8px; font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #111111; cursor: pointer; background: #FFFFFF; margin: 0 6px 6px 0; line-height: 1.2; }
  .chip:hover { background: #F0F0F0; }

  #layout { display: flex; width: 100%; height: calc(100% - 106px); background: #FFFFFF; position: relative; overflow: hidden; }

  .mobile-tabs { display: none; border-bottom: 1px solid #111111; background: #FFFFFF; flex-shrink: 0; }
  .mobile-tab { flex: 1; height: 44px; border: none; border-right: 1px solid #111111; background: #FFFFFF; color: #111111; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; font-family: inherit; cursor: pointer; }
  .mobile-tab:last-child { border-right: none; }
  .mobile-tab.active { background: #111111; color: #FFFFFF; }

  @media (max-width: 720px) {
    .mobile-tabs { display: flex; }
    #layout { height: calc(100% - 150px); }
    #index-panel { width: 100% !important; border-right: none !important; height: 100% !important; position: absolute; inset: 0; z-index: 3; }
    #map-wrap { width: 100% !important; height: 100% !important; position: absolute; inset: 0; z-index: 2; display: none; }
    #map-wrap.mobile-active { display: block !important; }
    #search-archive-btn { width: 36px; padding: 0; justify-content: center; font-size: 14px; letter-spacing: normal; }
    #search-archive-text { display: none; }
  }

  #index-panel { width: 380px; flex-shrink: 0; border-right: 1px solid #111111; display: flex; flex-direction: column; background: #FFFFFF; overflow: hidden; }
  .panel-section-container { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
  
  .section-label { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: #6B6B6B; margin-bottom: 10px; }
  .acc-head { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #111111; cursor: pointer; user-select: none; background: #FFFFFF; flex-shrink: 0; }
  .acc-head:hover { background: #F0F0F0; }
  .acc-body { display: none; padding: 14px 20px; border-bottom: 1px solid #111111; font-size: 11px; color: #111111; background: #FFFFFF; }
  .acc-body.open { display: block; }
  
  .acc-body label { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 0; }
  .acc-body input[type="checkbox"], .acc-body input[type="radio"] { margin: 0; flex-shrink: 0; accent-color: #111111; }

  #index-group { display: flex; flex: 1; overflow-y: auto; flex-direction: column; background: #FFFFFF; }
  #filters-group { display: flex; flex-direction: column; flex: 1; overflow-y: auto; }

  @media (max-width: 720px) {
    #filters-group { display: none; }
  }

  #list-wrap { flex: 1; background: #FFFFFF; overflow-y: auto; }
  .list-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid #111111; cursor: pointer; background: #FFFFFF; }
  .list-row:hover { background: #F0F0F0; }
  .list-street { font-size: 12px; color: #111111; font-weight: 400; }

  #footer-row { padding: 12px 20px; font-size: 10px; letter-spacing: 0.06em; color: #6B6B6B; border-top: 1px solid #111111; background: #FFFFFF; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .last-updated-badge { font-weight: 500; color: #111111; letter-spacing: 0.08em; text-transform: uppercase; display: inline-flex; align-items: center; gap: 4px; }
  .last-updated-badge::before { content: "●"; font-size: 8px; color: #111111; }

  .custom-marker-hitbox { width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; cursor: pointer; transform: translate(-22px, -22px); }
  .custom-marker-visual { min-width: 20px; height: 20px; padding: 0 4px; background: #111111; color: #FFFFFF; border: 1px solid #111111; border-radius: 0 !important; font-family: 'Inter', system-ui, sans-serif; font-size: 10px; font-weight: 500; display: flex; align-items: center; justify-content: center; transition: transform 0.15s ease, background-color 0.15s ease; }
  .custom-marker-hitbox:hover .custom-marker-visual { transform: scale(1.15); background: #333333; }

  #map-wrap { flex: 1; position: relative; background: #FFFFFF; }
  #map { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s ease; }
  #map.loaded { opacity: 1; }

  .pi-popup .mapboxgl-popup-content { background: #FFFFFF; border: 1px solid #111111; padding: 14px; font-family: 'Inter', system-ui, sans-serif; }
  .pi-popup .mapboxgl-popup-close-button { font-size: 16px; color: #6B6B6B; padding: 4px 8px; outline: none; border: none; background: transparent; cursor: pointer; }
  .pi-popup .mapboxgl-popup-close-button:hover { color: #111111; }

  #page-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFFFFF; font-family: sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #6B6B6B; z-index: 9999; transition: opacity 0.4s ease; }
  #page-loading.fade-out { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="page-loading">Loading media archive...</div>

<div id="topbar">
  <div id="search-row">
    <div id="geocoder"></div>
    <a id="search-archive-btn" href="https://photoindex.photodeck.com/" target="_top">
      <span id="search-archive-text">Search archive</span> →
    </a>
  </div>
  <div id="chip-row">
    <span id="chip-label">Your search</span>
    <span id="chips-here"></span>
  </div>
</div>

<div class="mobile-tabs">
  <button class="mobile-tab" id="tab-index" data-tab="index">Index</button>
  <button class="mobile-tab" id="tab-filters" data-tab="filters">Filters</button>
  <button class="mobile-tab active" id="tab-map" data-tab="map">Map</button>
</div>

<div id="layout">
  <div id="index-panel">
    <div class="panel-section-container" id="filters-group">
      
      <!-- LOKALIZACJA WYCIĄGANA DYNAMICZNIE -->
      <div class="acc-head" data-target="acc-location">
        <span class="section-label" style="margin:0;">Location</span><span style="font-size:10px;color:#111111;">＋</span>
      </div>
      <div class="acc-body open" id="acc-location">
        <label><input type="radio" name="location-group" class="location-check" value="" checked> All Locations</label>
        <div id="dynamic-locations"></div>
      </div>

      <!-- TAGI WYCIĄGANE DYNAMICZNIE Z KEYWORDS -->
      <div class="acc-head" data-target="acc-keywords">
        <span class="section-label" style="margin:0;">Keywords & Tags</span><span style="font-size:10px;color:#111111;">＋</span>
      </div>
      <div class="acc-body" id="acc-keywords">
        <div id="dynamic-keywords">Loading tags from CSV...</div>
      </div>

    </div>

    <div id="index-group" style="display:none; flex:1; overflow-y:auto; flex-direction:column; background:#FFFFFF;">
      <div id="list-wrap" style="flex:1;"></div>
      <div id="footer-row" style="border-top:1px solid #111111;">
        <span id="archive-count">Loading statistics...</span>
        <span class="last-updated-badge">MEDIA.CSV DRIVEN</span>
      </div>
    </div>
  </div>

  <div id="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoicGhvdG9pbmRleCIsImEiOiJjbW44aHl6NnMwYW1nMnBxMHdwc2VraTltIn0.B_Xqmf3Asxs1m_SVXIc7XQ';

var mediaRecords = [];
var searchState = { location: '', extraFilters: [] };
var activePopup = null;

var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [153.0307, -27.4598],
  zoom: 12
});
map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');

var geocoder = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  mapboxgl: mapboxgl,
  marker: false,
  placeholder: 'Search location or keyword…',
  flyTo: true
});
document.getElementById('geocoder').appendChild(geocoder.onAdd(map));

geocoder.on('result', function (e) {
  if (window.innerWidth <= 720) {
    var mapTab = document.getElementById('tab-map');
    if (mapTab) mapTab.click();
  }
});

// Ładowanie pliku media.csv przez PapaParse
Papa.parse('media.csv', {
  download: true,
  header: true,
  delimiter: ';', // Upewnij się, że używasz odpowiedniego separatora (zazwyczaj ; lub ,)
  skipEmptyLines: true,
  complete: function(results) {
    var rawData = results.data;
    
    mediaRecords = rawData.map((row, index) => {
      // Bezpieczne rozbicie tagów po przecinku (z uwzględnieniem pustych)
      var rawKw = row.keywords ? row.keywords.split(',').map(k => k.trim()).filter(Boolean) : [];
      
      // Prosty fallback na współrzędne, jeśli w pliku media.csv nie ma kolumn "lat" i "lng"
      var lat = parseFloat(row.lat);
      var lng = parseFloat(row.lng);
      var coords = (!isNaN(lng) && !isNaN(lat)) ? [lng, lat] : getFallbackCoords(row.location || row.city);

      return {
        id: row.uuid || 'id-' + index,
        title: row.title || row.file_name || 'Unnamed media',
        location: row.location || row.city || 'Brisbane',
        keywords: rawKw,
        coords: coords,
        archiveUrl: 'https://photoindex.photodeck.com/'
      };
    }).filter(r => r.coords !== null);

    initDynamicFilters();
    initMapEverything();

    var loadingEl = document.getElementById('page-loading');
    if (loadingEl) {
      loadingEl.classList.add('fade-out');
      setTimeout(() => loadingEl.style.display = 'none', 400);
    }
  }
});

function getFallbackCoords(locStr) {
  // Jeśli na razie nie masz dokładnych GPSów w media.csv, wrzucamy je do domyślnego punktu
  if (!locStr) return [153.03, -27.46];
  if (locStr.toLowerCase().includes('valley')) return [153.033, -27.456];
  if (locStr.toLowerCase().includes('milton')) return [153.004, -27.469];
  return [153.03, -27.46]; // Default Brisbane
}

function initDynamicFilters() {
  // Generowanie listy lokalizacji
  var locationsSet = [...new Set(mediaRecords.map(r => r.location))].sort();
  var locContainer = document.getElementById('dynamic-locations');
  locContainer.innerHTML = locationsSet.map(loc => 
    `<label><input type="radio" name="location-group" class="location-check" value="${loc}"> ${loc}</label>`
  ).join('');

  // Generowanie 40 najpopularniejszych tagów (możesz też wyciągać te ze specjalnym prefiksem np. arch:)
  var allKeywords = {};
  mediaRecords.forEach(r => {
    r.keywords.forEach(kw => {
      allKeywords[kw] = (allKeywords[kw] || 0) + 1;
    });
  });

  var topKeywords = Object.keys(allKeywords).sort((a,b) => allKeywords[b] - allKeywords[a]).slice(0, 40);
  var kwContainer = document.getElementById('dynamic-keywords');
  kwContainer.innerHTML = topKeywords.map(kw => 
    `<label><input type="checkbox" class="filter-check" value="${kw}"> ${kw} <span style="color:#6B6B6B; font-size:9px;">(${allKeywords[kw]})</span></label>`
  ).join('');

  attachFilterEvents();
}

function initMapEverything() {
  function setupMap() {
    document.getElementById('map').classList.add('loaded');
    renderMarkers(mediaRecords);
    renderList(mediaRecords);
    updateStats(mediaRecords.length, mediaRecords.length);
  }

  // Rozwiązanie problemu Race Condition Mapboxa
  if (map.loaded()) {
    setupMap();
  } else {
    map.on('load', setupMap);
  }
}

function renderMarkers(items) {
  // Usuwanie starych markerów (przy aktualizacji)
  mediaRecords.forEach(item => {
    if (item.marker) item.marker.remove();
  });

  items.forEach(item => {
    var el = document.createElement('div');
    el.className = 'custom-marker-hitbox';
    el.innerHTML = '<div class="custom-marker-visual">1</div>'; // Tutaj można dodać grupowanie, jeśli jest np. 5 zdjęć na jednych koordynatach

    var popupHtml = 
      '<div style="font-family:Inter,system-ui,sans-serif;padding:2px;min-width:180px;">' +
        '<div style="font-size:13px;color:#111111;margin-bottom:4px;font-weight:500;">' + item.title + '</div>' +
        '<div style="font-size:10px;color:#6B6B6B;margin-bottom:8px;">' + item.location + '</div>' +
        '<a href="' + item.archiveUrl + '" target="_top" style="display:block;text-align:center;background:#111;color:#fff;padding:8px 6px;font-size:10px;font-weight:500;text-decoration:none;">VIEW MEDIA →</a>' +
      '</div>';

    item.popup = new mapboxgl.Popup({ offset: 14, closeButton: true, className: 'pi-popup' }).setHTML(popupHtml);
    item.marker = new mapboxgl.Marker({ element: el }).setLngLat(item.coords).addTo(map);
    
    el.addEventListener('click', (ev) => {
      ev.stopPropagation();
      if (activePopup) activePopup.remove();
      item.popup.setLngLat(item.coords).addTo(map);
      activePopup = item.popup;
    });
  });
}

function renderList(items) {
  var wrap = document.getElementById('list-wrap');
  wrap.innerHTML = '';
  items.slice(0, 100).forEach(item => {
    var row = document.createElement('div');
    row.className = 'list-row';
    row.innerHTML = `<div class="list-street">${item.title} <span style="color:#6B6B6B;font-size:10px;">(${item.location})</span></div>`;
    row.addEventListener('click', () => {
      if (window.innerWidth <= 720) {
        document.getElementById('tab-map').click();
      }
      map.flyTo({ center: item.coords, zoom: 15 });
      if (activePopup) activePopup.remove();
      item.popup.setLngLat(item.coords).addTo(map);
      activePopup = item.popup;
    });
    wrap.appendChild(row);
  });
}

function attachFilterEvents() {
  // Rozwijanie akordeonów
  document.querySelectorAll('.acc-head').forEach(function (h) {
    h.addEventListener('click', function () {
      var targetId = h.getAttribute('data-target');
      var body = document.getElementById(targetId);
      if (body) body.classList.toggle('open');
    });
  });

  // Reagowanie na zmiany lokalizacji
  document.querySelectorAll('.location-check').forEach(cb => {
    cb.addEventListener('change', (e) => {
      searchState.location = e.target.value;
      applyFilters();
    });
  });

  // Reagowanie na zmiany tagów (Keywords)
  document.querySelectorAll('.filter-check').forEach(cb => {
    cb.addEventListener('change', (e) => {
      var val = e.target.value;
      var i = searchState.extraFilters.indexOf(val);
      if (i === -1) searchState.extraFilters.push(val);
      else searchState.extraFilters.splice(i, 1);
      applyFilters();
    });
  });
}

function applyFilters() {
  var filtered = mediaRecords.filter(item => {
    var matchesLoc = !searchState.location || item.location === searchState.location;
    var matchesKw = searchState.extraFilters.length === 0 || searchState.extraFilters.every(f => item.keywords.includes(f));
    return matchesLoc && matchesKw;
  });

  // Ukrywanie/pokazywanie markerów na mapie
  mediaRecords.forEach(item => {
    var visible = filtered.includes(item);
    if (item.marker) item.marker.getElement().style.display = visible ? '' : 'none';
  });

  renderList(filtered);
  updateStats(filtered.length, mediaRecords.length);
  renderChips();
}

function renderChips() {
  var chips = [];
  if (searchState.location) chips.push({ 
    label: searchState.location, 
    clear: function () { 
      searchState.location = ''; 
      document.querySelectorAll('.location-check').forEach(cb => { cb.checked = (cb.value === ''); }); 
      applyFilters(); 
    } 
  });
  
  searchState.extraFilters.forEach(f => { 
    chips.push({ 
      label: f, 
      clear: function () { 
        searchState.extraFilters.splice(searchState.extraFilters.indexOf(f), 1); 
        document.querySelectorAll(`.filter-check[value="${f}"]`).forEach(cb => cb.checked = false); 
        applyFilters(); 
      } 
    }); 
  });

  var host = document.getElementById('chips-here');
  var chipRow = document.getElementById('chip-row');
  if (!host || !chipRow) return;

  host.innerHTML = '';
  if (chips.length > 0) {
    chipRow.classList.add('has-search');
    chips.forEach(c => {
      var span = document.createElement('span');
      span.className = 'chip';
      span.innerHTML = '<span>' + c.label + '</span><span>×</span>';
      span.addEventListener('click', c.clear);
      host.appendChild(span);
    });
  } else {
    chipRow.classList.remove('has-search');
  }
}

function updateStats(filtered, total) {
  document.getElementById('archive-count').textContent = `${filtered} of ${total} media records`;
}

// Logika dla mobilnych zakładek (Tabs)
var mobileTabConfigs = {
  index: { btn: document.getElementById('tab-index') },
  filters: { btn: document.getElementById('tab-filters') },
  map: { btn: document.getElementById('tab-map') }
};

Object.keys(mobileTabConfigs).forEach(function(key) {
  var conf = mobileTabConfigs[key];
  if (!conf.btn) return;
  conf.btn.addEventListener('click', function() {
    document.querySelectorAll('.mobile-tabs .mobile-tab').forEach(function(t) { t.classList.remove('active'); });
    this.classList.add('active');

    var indexPanel = document.getElementById('index-panel');
    var indexGroup = document.getElementById('index-group');
    var filtersGroup = document.getElementById('filters-group');
    var mapWrap = document.getElementById('map-wrap');

    if (key === 'map') {
      indexPanel.style.display = 'none';
      mapWrap.classList.add('mobile-active');
      setTimeout(function() { map.resize(); }, 50);
    } else {
      indexPanel.style.display = 'flex';
      mapWrap.classList.remove('mobile-active');
      if (key === 'index') {
        indexGroup.style.display = 'flex';
        filtersGroup.style.display = 'none';
      } else if (key === 'filters') {
        indexGroup.style.display = 'none';
        filtersGroup.style.display = 'flex';
      }
    }
  });
});

if (window.innerWidth <= 720) {
  var mapTab = document.getElementById('tab-map');
  if (mapTab) mapTab.click();
}
</script>

</body>
</html>
