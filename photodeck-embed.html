<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PhotoIndex — Spatial Archive & Explorer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/v3.0.1/mapbox-gl.js"></script>
<link href="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.css" rel="stylesheet">
<script src="https://api.mapbox.com/mapbox-gl-js/plugins/mapbox-gl-geocoder/v5.0.0/mapbox-gl-geocoder.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
  * { box-sizing: border-box; border-radius: 0 !important; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; background: #FFFFFF; color: #111111; }

  #app-root { display: flex; flex-direction: column; width: 100vw; height: 100vh; }

  #topbar { display: flex; align-items: center; height: 56px; padding: 0 20px; border-bottom: 1px solid #111111; gap: 12px; background: #FFFFFF; flex-shrink: 0; z-index: 30; }
  #geocoder { flex: 1; }
  #geocoder .mapboxgl-ctrl-geocoder { width: 100%; max-width: none; font-family: inherit; box-shadow: none; background: #FFFFFF; }
  #geocoder .mapboxgl-ctrl-geocoder input { height: 36px; font-size: 13px; color: #111111; font-family: inherit; background: #FFFFFF; }
  #geocoder .mapboxgl-ctrl-geocoder--icon-search { fill: #6B6B6B; top: 9px; }

  #search-archive-btn { height: 36px; padding: 0 16px; border: 1px solid #111111; background: #111111; color: #FFFFFF; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; text-decoration: none; flex-shrink: 0; }
  #search-archive-btn:hover { background: #333333; }

  #main-layout { display: flex; flex: 1; position: relative; overflow: hidden; }

  #sidebar { width: 340px; border-right: 1px solid #111111; display: flex; flex-direction: column; background: #FFFFFF; z-index: 10; overflow-y: auto; flex-shrink: 0; }
  .sidebar-header { padding: 14px 20px; border-bottom: 1px solid #111111; font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; background: #FFFFFF; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .scale-badge { font-size: 8px; padding: 2px 6px; background: #111111; color: #FFFFFF; letter-spacing: 0.1em; }

  .facet-group { border-bottom: 1px solid #111111; padding: 14px 20px; flex-shrink: 0; }
  .facet-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.12em; color: #6B6B6B; margin-bottom: 10px; }
  
  .facet-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .facet-tag { font-size: 10px; padding: 4px 8px; border: 1px solid #111111; cursor: pointer; text-transform: uppercase; letter-spacing: 0.08em; transition: all 0.15s ease; background: #FFFFFF; }
  .facet-tag:hover { background: #F0F0F0; }
  .facet-tag.active { background: #111111; color: #FFFFFF; }
  .facet-tag.disabled { opacity: 0.25; pointer-events: none; border-color: #CCCCCC; }

  #micro-facets-wrapper { transition: opacity 0.3s ease; }
  body:not(.micro-scale) #micro-facets-wrapper { opacity: 0.4; pointer-events: none; }
  body:not(.micro-scale) #micro-notice { display: block; font-size: 9px; color: #6B6B6B; margin-top: 6px; font-style: italic; }
  #micro-notice { display: none; }

  #map-container { flex: 1; position: relative; background: #FFFFFF; }
  #map { position: absolute; inset: 0; opacity: 0; transition: opacity 0.6s ease; }
  #map.loaded { opacity: 1; }

  #media-drawer { position: absolute; bottom: 0; left: 0; right: 0; height: 250px; background: #FFFFFF; border-top: 1px solid #111111; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1); z-index: 20; display: flex; flex-direction: column; }
  #media-drawer.open { transform: translateY(0); }
  
  .drawer-header { padding: 10px 20px; border-bottom: 1px solid #111111; display: flex; justify-content: space-between; align-items: center; background: #FFFFFF; }
  .drawer-title { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; }
  .close-drawer { cursor: pointer; font-size: 16px; font-weight: bold; padding: 0 4px; color: #6B6B6B; }
  .close-drawer:hover { color: #111111; }

  .drawer-content { flex: 1; overflow-x: auto; display: flex; padding: 14px 20px; gap: 16px; align-items: center; }
  .media-card { flex: 0 0 180px; height: 170px; border: 1px solid #111111; display: flex; flex-direction: column; background: #FFFFFF; text-decoration: none; color: inherit; overflow: hidden; transition: border-color 0.15s ease; }
  .media-card:hover { border-color: #6B6B6B; }
  .media-card img { width: 100%; height: 100px; object-fit: cover; border-bottom: 1px solid #111111; background: #F0F0F0; }
  .media-card-info { padding: 8px; flex: 1; display: flex; flex-direction: column; justify-content: space-between; }
  .media-card-title { font-size: 10px; font-weight: 600; line-height: 1.2; overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .media-card-action { font-size: 9px; text-transform: uppercase; font-weight: 600; letter-spacing: 0.1em; color: #6B6B6B; }

  #page-loading { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #FFFFFF; font-family: sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: #6B6B6B; z-index: 9999; transition: opacity 0.4s ease; }
  #page-loading.fade-out { opacity: 0; pointer-events: none; }

  @media (max-width: 720px) {
    #main-layout { flex-direction: column-reverse; }
    #sidebar { width: 100%; height: 40vh; border-right: none; border-top: 1px solid #111111; }
    #search-archive-text { display: none; }
  }
</style>
</head>
<body>

<div id="page-loading">Loading spatial archive...</div>

<div id="app-root">
  <div id="topbar">
    <div id="geocoder"></div>
    <a id="search-archive-btn" href="https://photoindex.photodeck.com/" target="_top">
      <span id="search-archive-text">Search archive</span> →
    </a>
  </div>

  <div id="main-layout">
    <div id="sidebar">
      <div class="sidebar-header">
        <span>Faceted Filters</span>
        <span class="scale-badge" id="scale-indicator">MACRO VIEW</span>
      </div>

      <div class="facet-group">
        <div class="facet-title">Location / Suburb</div>
        <div class="facet-list" id="suburb-facets"></div>
      </div>

      <div class="facet-group" id="micro-facets-wrapper">
        <div class="facet-title">Micro Spatial Tags</div>
        <div class="facet-list" id="micro-facets"></div>
        <span id="micro-notice">Zoom in closer to street level to activate micro-tags</span>
      </div>
    </div>

    <div id="map-container">
      <div id="map"></div>

      <div id="media-drawer">
        <div class="drawer-header">
          <span class="drawer-title" id="drawer-location-title">Select a location</span>
          <span class="close-drawer" onclick="closeDrawer()">×</span>
        </div>
        <div class="drawer-content" id="drawer-gallery"></div>
      </div>
    </div>
  </div>
</div>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoicGhvdG9pbmRleCIsImEiOiJjbW44aHl6NnMwYW1nMnBxMHdwc2VraTltIn0.B_Xqmf3Asxs1m_SVXIc7XQ';

var mediaArchive = [];
var activeFilters = { suburb: null, micro: [], search: '' };
var markersMap = [];

var map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/light-v11',
  center: [153.0281, -27.4580],
  zoom: 12.5
});
map.addControl(new mapboxgl.NavigationControl({ showCompass: false }), 'bottom-right');

var geocoder = new MapboxGeocoder({
  accessToken: mapboxgl.accessToken,
  mapboxgl: mapboxgl,
  marker: false,
  placeholder: 'Search address, place or keyword…',
  countries: 'au',
  flyTo: true
});
document.getElementById('geocoder').appendChild(geocoder.onAdd(map));

geocoder.on('result', function(e) {
  if (e.result && e.result.text) {
    activeFilters.search = e.result.text.toLowerCase();
    applyFacetedFilter();
  }
});

geocoder.on('clear', function() {
  activeFilters.search = '';
  applyFacetedFilter();
});

// Zabezpieczony mechanizm ładowania danych
Papa.parse('media.csv', {
  download: true,
  header: true,
  delimiter: ';',
  skipEmptyLines: true,
  complete: function(results) {
    if (results.data && results.data.length > 0) {
      mediaArchive = processRawData(results.data);
    } else {
      loadFallbackDemoData();
    }
    startApp();
  },
  error: function() {
    console.warn("Plik media.csv niedostępny bezpośrednio. Uruchamianie danych demonstracyjnych.");
    loadFallbackDemoData();
    startApp();
  }
});

function processRawData(data) {
  return data.map((row, idx) => {
    var rawTags = row.keywords ? row.keywords.split(',').map(t => t.trim()).filter(Boolean) : [];
    var lng = parseFloat(row.lng);
    var lat = parseFloat(row.lat);
    var loc = row.location || row.city || row.suburb || 'Brisbane City';
    
    return {
      id: row.uuid || 'rec-' + idx,
      title: row.title || row.file_name || 'Documented Space',
      suburb: loc,
      tags: rawTags,
      coords: (!isNaN(lng) && !isNaN(lat)) ? [lng, lat] : getFallbackCoords(loc),
      thumb: row.thumb_url || 'https://via.placeholder.com/180x100/111111/FFFFFF?text=PhotoIndex',
      url: 'https://photoindex.photodeck.com/'
    };
  });
}

function loadFallbackDemoData() {
  mediaArchive = [
    { id: 'd1', title: '300 North Quay Project', suburb: 'Brisbane City', tags: ['concrete facade', 'under construction', 'residential tower'], coords: [153.021, -27.468], thumb: 'https://via.placeholder.com/180x100/111111/FFFFFF?text=North+Quay', url: 'https://photoindex.photodeck.com/' },
    { id: 'd2', title: 'Ann Street Commercial Development', suburb: 'Fortitude Valley', tags: ['glass facade', 'pedestrian zone', 'commercial'], coords: [153.035, -27.456], thumb: 'https://via.placeholder.com/180x100/111111/FFFFFF?text=Ann+Street', url: 'https://photoindex.photodeck.com/' },
    { id: 'd3', title: 'South Bank Public Realm Expansion', suburb: 'South Brisbane', tags: ['public art', 'pedestrian zone', 'riverfront'], coords: [153.020, -27.475], thumb: 'https://via.placeholder.com/180x100/111111/FFFFFF?text=South+Bank', url: 'https://photoindex.photodeck.com/' }
  ];
}

function getFallbackCoords(locStr) {
  if (!locStr) return [153.0281, -27.4580];
  var s = locStr.toLowerCase();
  if (s.includes('valley')) return [153.035, -27.456];
  if (s.includes('south')) return [153.020, -27.475];
  if (s.includes('west end')) return [153.012, -27.482];
  return [153.0281, -27.4580];
}

function startApp() {
  initFacetedSystem();
  var loadingEl = document.getElementById('page-loading');
  if (loadingEl) {
    loadingEl.classList.add('fade-out');
    setTimeout(() => loadingEl.style.display = 'none', 400);
  }
}

function initFacetedSystem() {
  buildFacetedUI();

  function setupMap() {
    document.getElementById('map').classList.add('loaded');
    renderMarkers(mediaArchive);

    map.on('zoom', function() {
      var z = map.getZoom();
      var indicator = document.getElementById('scale-indicator');
      if (z >= 14) {
        document.body.classList.add('micro-scale');
        indicator.textContent = 'MICRO / STREET';
      } else {
        document.body.classList.remove('micro-scale');
        indicator.textContent = 'MACRO VIEW';
      }
    });

    map.on('moveend', updateAvailableFacets);
  }

  if (map.loaded()) {
    setupMap();
  } else {
    map.on('load', setupMap);
  }
}

function buildFacetedUI() {
  var suburbs = [...new Set(mediaArchive.map(m => m.suburb))].sort();
  var suburbContainer = document.getElementById('suburb-facets');
  suburbContainer.innerHTML = suburbs.map(sub => 
    `<div class="facet-tag" data-suburb="${sub}" onclick="toggleSuburb('${sub}')">${sub}</div>`
  ).join('');

  var allTags = [...new Set(mediaArchive.flatMap(m => m.tags))].sort();
  var microContainer = document.getElementById('micro-facets');
  microContainer.innerHTML = allTags.slice(0, 20).map(tag => 
    `<div class="facet-tag" data-micro="${tag}" onclick="toggleMicro('${tag}')">${tag}</div>`
  ).join('');
}

function renderMarkers(items) {
  markersMap.forEach(m => m.remove());
  markersMap = [];

  items.forEach(item => {
    var el = document.createElement('div');
    el.style.width = '12px';
    el.style.height = '12px';
    el.style.backgroundColor = '#111111';
    el.style.cursor = 'pointer';
    el.style.border = '1px solid #FFFFFF';

    var marker = new mapboxgl.Marker(el)
      .setLngLat(item.coords)
      .addTo(map);

    el.addEventListener('click', (e) => {
      e.stopPropagation();
      openDrawerForLocation(item.suburb, item.coords);
    });

    markersMap.push(marker);
  });
}

function toggleSuburb(suburb) {
  activeFilters.suburb = (activeFilters.suburb === suburb) ? null : suburb;
  document.querySelectorAll('#suburb-facets .facet-tag').forEach(el => {
    el.classList.toggle('active', el.getAttribute('data-suburb') === activeFilters.suburb);
  });
  applyFacetedFilter();
}

function toggleMicro(tag) {
  var idx = activeFilters.micro.indexOf(tag);
  if (idx > -1) activeFilters.micro.splice(idx, 1);
  else activeFilters.micro.push(tag);

  document.querySelectorAll('#micro-facets .facet-tag').forEach(el => {
    var val = el.getAttribute('data-micro');
    el.classList.toggle('active', activeFilters.micro.includes(val));
  });

  applyFacetedFilter();
}

function applyFacetedFilter() {
  var filtered = mediaArchive.filter(item => {
    var matchSub = !activeFilters.suburb || item.suburb === activeFilters.suburb;
    var matchMicro = activeFilters.micro.length === 0 || activeFilters.micro.every(t => item.tags.includes(t));
    var matchSearch = !activeFilters.search || 
      item.title.toLowerCase().includes(activeFilters.search) ||
      item.suburb.toLowerCase().includes(activeFilters.search) ||
      item.tags.some(t => t.toLowerCase().includes(activeFilters.search));

    return matchSub && matchMicro && matchSearch;
  });

  renderMarkers(filtered);
  updateAvailableFacets();
}

function updateAvailableFacets() {
  var bounds = map.getBounds();
  var visibleMedia = mediaArchive.filter(m => bounds.contains(m.coords));
  var visibleSuburbs = new Set(visibleMedia.map(m => m.suburb));
  var visibleTags = new Set(visibleMedia.flatMap(m => m.tags));

  document.querySelectorAll('#suburb-facets .facet-tag').forEach(el => {
    var sub = el.getAttribute('data-suburb');
    el.classList.toggle('disabled', !visibleSuburbs.has(sub));
  });

  document.querySelectorAll('#micro-facets .facet-tag').forEach(el => {
    var tag = el.getAttribute('data-micro');
    el.classList.toggle('disabled', !visibleTags.has(tag));
  });
}

function openDrawerForLocation(suburbName, coords) {
  var drawer = document.getElementById('media-drawer');
  var title = document.getElementById('drawer-location-title');
  var gallery = document.getElementById('drawer-gallery');

  var matches = mediaArchive.filter(m => m.suburb === suburbName);
  title.textContent = `${suburbName} — ${matches.length} Media Records`;
  
  gallery.innerHTML = matches.map(m => `
    <a href="${m.url}" target="_top" class="media-card">
      <img src="${m.thumb}" alt="${m.title}">
      <div class="media-card-info">
        <div class="media-card-title">${m.title}</div>
        <div class="media-card-action">View Archive →</div>
      </div>
    </a>
  `).join('');

  drawer.classList.add('open');
  map.flyTo({ center: coords, zoom: 15 });
}

function closeDrawer() {
  document.getElementById('media-drawer').classList.remove('open');
}
</script>
</body>
</html>
