<iframe id="pi-map-search-iframe" src="https://sproutssorbets.github.io/bne-urban/photodeck-embed.html" width="100%" height="900" style="border:none;" scrolling="no" allowfullscreen allow="fullscreen"></iframe>
<script>
window.addEventListener('message', function(e){
  if (e.origin !== 'https://sproutssorbets.github.io') return;
  if (!e.data || e.data.type !== 'pi-embed-height') return;
  var f = document.getElementById('pi-map-search-iframe');
  if (f) f.style.height = e.data.height + 'px';
});
</script>
