<iframe id="pi-map-search-iframe" src="https://sproutssorbets.github.io/bne-urban/photodeck-embed.html" width="100%" height="900" style="border:none;" scrolling="no"></iframe>
<script>
window.addEventListener('message', function(e){
  if (e.origin !== 'https://sproutssorbets.github.io') return;
  if (!e.data || !e.data.type) return;
  var f = document.getElementById('pi-map-search-iframe');
  if (!f) return;

  if (e.data.type === 'pi-embed-height') {
    f.style.height = e.data.height + 'px';
  }

  if (e.data.type === 'pi-pseudo-fullscreen') {
    if (e.data.active) {
      f.style.position = 'fixed';
      f.style.top = '0';
      f.style.left = '0';
      f.style.width = '100vw';
      f.style.height = '100vh';
      f.style.zIndex = '99999';
    } else {
      f.style.position = '';
      f.style.top = '';
      f.style.left = '';
      f.style.width = '100%';
      f.style.zIndex = '';
      /* wysokość wróci do normalnej same, bo embed po wyjściu z pseudo-fullscreen
         sam wysyła świeży pi-embed-height */
    }
  }
});
</script>
